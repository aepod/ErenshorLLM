# erenshor-llm sidecar configuration
# All paths are relative to --data-dir unless absolute.

[server]
port = 11435
host = "127.0.0.1"

[embedding]
model_path = "models/all-minilm-l6-v2.onnx"
tokenizer_path = "models/tokenizer.json"
threads = 2

[indexes]
lore_path = "dist/lore.json"
responses_path = "dist/responses.json"
memory_path = "dist/memory.json"
personality_path = "dist/personality.ruvector"

[sona]
enabled = true
learning_rate = 0.01

[respond]
template_candidates = 10
lore_candidates = 3
memory_candidates = 3
min_confidence = 0.3
zone_weight = 0.2
personality_weight = 0.3
relationship_weight = 0.15
channel_weight = 0.15

# Phase 3: LLM text generation
[llm]
enabled = false          # Set to true to enable LLM enhancement
mode = "off"             # off, local, cloud, hybrid
enhance_threshold = 0.85 # Template confidence below which LLM fires
max_tokens = 150
temperature = 0.7
queue_depth = 5

[llm.local]
model_path = "models/qwen3-1.7b-q4_k_m.gguf"
context_size = 2048
gpu_layers = 999            # 0=CPU only, 999=offload all layers to GPU (CUDA/Vulkan)

[llm.cloud]
provider = "openrouter"
api_key = ""
api_endpoint = "https://openrouter.ai/api/v1"
model = "anthropic/claude-3.5-haiku"
timeout_ms = 10000
